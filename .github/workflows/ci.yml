name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite (offline)
        run: pytest

  e2e:
    name: End-to-end demo scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run sf-plugin scan (clean target)
        run: |
          sf-scan scan \
            --repo https://github.com/8090-inc/software-factory-plugin \
            --kg ./kg/software-factory-plugin \
            --out ./reports/sf-plugin

      - name: Verify sf-plugin report shape
        run: |
          test -f ./reports/sf-plugin/report.md
          test -f ./reports/sf-plugin/report.json
          grep -q "## Executive Summary" ./reports/sf-plugin/report.md

      - name: Run multi-target scan (sf-plugin + NodeGoat)
        run: |
          sf-scan scan \
            --repo https://github.com/8090-inc/software-factory-plugin \
            --repo https://github.com/OWASP/NodeGoat \
            --kg ./kg/software-factory-plugin \
            --out ./reports/multi-target

      - name: Verify multi-target report has findings
        run: |
          test -f ./reports/multi-target/report.md
          grep -q "## Findings by PRD Requirement" ./reports/multi-target/report.md
          grep -q "## Unmapped Findings" ./reports/multi-target/report.md
          python -c "
          import json
          data = json.load(open('./reports/multi-target/report.json'))
          assert data['summary']['total_findings'] > 0, 'Expected non-zero findings'
          print(f'OK: {data[\"summary\"][\"total_findings\"]} findings, '
                f'{data[\"summary\"][\"mapped_count\"]} mapped, '
                f'{data[\"summary\"][\"unmapped_count\"]} unmapped')
          "

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports
          path: ./reports
          retention-days: 30
